name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Smoke test (detection)
        run: .build/debug/Clamshell test-detect
      - name: Package (release build, ad-hoc signed DMG)
        run: ./package.sh 0.0.0
      - name: Build iOS viewer (simulator, compile check only)
        run: |
          cd ClamshellViewer
          xcodebuild -project ClamshellViewer.xcodeproj -target ClamshellViewer \
            -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO build
