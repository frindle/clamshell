name: Release
on:
  push:
    tags: ['v*']

jobs:
  release-macos:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          P12: ${{ secrets.CLAMSHELL_CERT_P12 }}
          PW: ${{ secrets.CLAMSHELL_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="ci-$(uuidgen)"

          echo "$P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          # Keep the login keychain in the search list too; prepend ours.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no auto-lock mid-run
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          # No add-trusted-cert: codesign signing does not require the cert to
          # be trusted, and modifying trust settings needs an interactive
          # authorization that can't be answered on a headless runner.
          echo "--- codesign-capable identities (may not appear under -v when untrusted):"
          security find-identity -p codesigning "$KEYCHAIN"

      - name: Package
        env:
          # Force the identity by name: a freshly imported untrusted cert isn't
          # listed by `find-identity -v`, so package.sh's default probe would
          # fall back to ad-hoc. codesign signs with it regardless of trust.
          SIGN_ID: Clamshell Dev
        run: ./package.sh "${GITHUB_REF_NAME#v}"

      - name: Verify signature identity
        run: |
          set -euo pipefail
          # -dvv, not -dv: Authority= is only printed at verbosity 2+.
          # Plain grep (not -q, no tee): it prints the matched line for the log
          # and reads to EOF, so no SIGPIPE/broken-pipe trips pipefail.
          codesign -dvv dist/Clamshell.app 2>&1 | grep "Authority=Clamshell Dev"
          codesign --verify --deep --strict dist/Clamshell.app
          echo "signature identity OK: Clamshell Dev"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "Clamshell $GITHUB_REF_NAME" \
            --generate-notes

  release-windows:
    runs-on: windows-latest
    needs: release-macos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained host
        # Single-file, self-contained: the installer ships a binary that
        # runs without a separate .NET runtime install on the target machine.
        run: >
          dotnet publish WindowsServer/ClamshellServer.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version WindowsServer\installer.iss

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:GITHUB_REF_NAME" dist\*.exe
