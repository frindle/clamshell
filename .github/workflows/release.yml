name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Package
        run: ./package.sh "${GITHUB_REF_NAME#v}"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "Clamshell $GITHUB_REF_NAME" \
            --generate-notes
